# ============================================================
# docker-compose.yml — Sistema de Gestión Docente UCI
# Uso: docker-compose up -d
# ============================================================

# ── Redes ────────────────────────────────────────────────────
networks:
  docente_network:
    driver: bridge

# ── Volúmenes persistentes ───────────────────────────────────
volumes:
  postgres_data:          # Datos de PostgreSQL sobreviven docker-compose down

# ── Servicios ────────────────────────────────────────────────
services:

  # ----------------------------------------------------------
  # SERVICIO 1: Base de datos PostgreSQL 15
  # ----------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: docente_postgres
    restart: unless-stopped
    networks:
      - docente_network

    # Credenciales y nombre de la BD
    environment:
      POSTGRES_DB:       docente_db
      POSTGRES_USER:     docente
      POSTGRES_PASSWORD: docente_dev_password

    # Puerto host:contenedor
    ports:
      - "5432:5432"

    # Persistencia de datos + script de inicialización
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01_initial_schema.sql

    # Healthcheck: el API no arranca hasta que la BD esté lista
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docente -d docente_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ----------------------------------------------------------
  # SERVICIO 2: Backend Express (Node 18)
  # ----------------------------------------------------------
  api:
    build:
      context: ./backend        # el Dockerfile entiende rutas relativas a ./backend
      dockerfile: Dockerfile
    container_name: docente_api
    restart: unless-stopped
    networks:
      - docente_network

    # Solo arranca cuando postgres pasa el healthcheck
    depends_on:
      postgres:
        condition: service_healthy

    # Variables de entorno del proceso Node
    environment:
      NODE_ENV:     development
      PORT:         5000
      DATABASE_URL: postgresql://docente:docente_dev_password@postgres:5432/docente_db

    # Puerto host 3000 → contenedor 5000
    ports:
      - "3000:5000"

    # Bind mounts para hot-reload en desarrollo
    volumes:
      - ./backend/src:/app/src            # código fuente (nodemon lo vigila)
      - ./backend/node_modules:/app/node_modules  # caché de dependencias

    # Arranca en modo desarrollo con nodemon
    command: npm run dev
